<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Emotion Gallery</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0f0f1a;
  --card:#1a1a2e;
  --text:#e0e0e0;
  --muted:#888;
  --joy:#f6c944;
  --sadness:#4a90d9;
  --anger:#e04848;
  --fear:#9b59b6;
  --surprise:#e67e22;
  --disgust:#2ecc71;
  --nostalgia:#c48f65;
  --awe:#5c6bc0;
  --melancholy:#78909c;
  --tension:#ff7043;
  --serenity:#4dd0e1;
  --longing:#f48fb1;
  --accent:var(--joy);
  --radius:10px;
  --warn:#f0a500;
  --danger:#e04848;
}

body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* ---- screens ---- */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.5rem;
  opacity:0;pointer-events:none;
  transition:opacity .3s;
  overflow-y:auto;
}
.screen.active{opacity:1;pointer-events:auto}

/* ---- global buttons ---- */
.btn{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.75rem 1.8rem;border:none;border-radius:8px;
  font-size:1rem;font-weight:600;cursor:pointer;color:#fff;
  background:var(--accent);
  transition:opacity .2s;
}
.btn:hover{opacity:.85}
.btn:active{opacity:.7}
.btn-ghost{
  background:rgba(255,255,255,.08);
  color:var(--muted);border:1.5px solid rgba(255,255,255,.12);
}
.btn-ghost:hover{background:rgba(255,255,255,.14);color:var(--text);opacity:1}
.btn-sm{padding:.45rem 1.1rem;font-size:.82rem}

/* ---- fixed overlays ---- */
.overlay-btn{
  position:fixed;padding:.45rem 1rem;border-radius:6px;
  font-size:.8rem;font-weight:600;cursor:pointer;
  background:rgba(255,255,255,.08);color:var(--muted);
  border:1.5px solid rgba(255,255,255,.12);
  z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;
}
.overlay-btn.visible{opacity:1;pointer-events:auto}
.overlay-btn:hover{background:rgba(255,255,255,.15);color:var(--text)}
#btnSkip{top:1.2rem;right:1.2rem}
#btnHome{top:1.2rem;left:1.2rem}
#btnMute{bottom:1.2rem;right:1.2rem;position:fixed;z-index:200;
  padding:.45rem 1rem;border-radius:6px;font-size:.8rem;font-weight:600;
  cursor:pointer;background:rgba(255,255,255,.08);color:var(--muted);
  border:1.5px solid rgba(255,255,255,.12);opacity:1;pointer-events:auto;transition:opacity .3s}
#btnMute:hover{background:rgba(255,255,255,.15);color:var(--text)}
#roundCounter{
  position:fixed;top:1.2rem;left:50%;transform:translateX(-50%);
  font-size:.75rem;font-weight:700;color:var(--muted);
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  padding:.3rem .9rem;border-radius:6px;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#roundCounter.visible{opacity:1}

/* ---- start screen ---- */
#start h1{
  font-size:clamp(1.8rem,6vw,3.2rem);font-weight:800;letter-spacing:-.02em;
  color:var(--joy);
}
#start .subtitle{margin:.6rem 0 1.2rem;color:var(--muted);max-width:420px;text-align:center;line-height:1.6;font-size:.95rem}

.setup-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:.8rem;
  max-width:460px;width:100%;margin-bottom:1rem;
}
.setup-group{text-align:left}
.setup-group label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.35rem}
.setup-group select{
  width:100%;padding:.5rem .8rem;border-radius:8px;
  background:var(--card);color:var(--text);border:1.5px solid rgba(255,255,255,.1);
  font-size:.9rem;cursor:pointer;
}
.setup-group select:focus{outline:none;border-color:var(--accent)}

.player-setup{max-width:460px;width:100%;margin-bottom:1rem}
.player-setup label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.35rem}
.player-input-row{display:flex;gap:.5rem}
.player-input-row input{
  flex:1;padding:.5rem .8rem;border-radius:8px;
  background:var(--card);color:var(--text);border:1.5px solid rgba(255,255,255,.1);
  font-size:.9rem;
}
.player-input-row input:focus{outline:none;border-color:var(--accent)}
.player-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem}
.player-tag{
  display:inline-flex;align-items:center;gap:.3rem;
  padding:.25rem .7rem;border-radius:6px;font-size:.78rem;font-weight:600;
  background:rgba(255,255,255,.08);color:var(--text);
}
.player-tag .remove{cursor:pointer;opacity:.5;font-size:.9rem}
.player-tag .remove:hover{opacity:1}

.scenario-section{max-width:460px;width:100%;margin-bottom:1rem}
.scenario-section label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.35rem}
.scenario-tabs{display:flex;gap:0;margin-bottom:.6rem;border-radius:8px;overflow:hidden;border:1.5px solid rgba(255,255,255,.1)}
.scenario-tab{
  flex:1;padding:.45rem .5rem;font-size:.75rem;font-weight:600;
  background:transparent;color:var(--muted);border:none;cursor:pointer;
  transition:background .2s,color .2s;text-align:center;
}
.scenario-tab:not(:last-child){border-right:1.5px solid rgba(255,255,255,.1)}
.scenario-tab.active{background:rgba(255,255,255,.1);color:var(--text)}
.scenario-tab:hover:not(.active){background:rgba(255,255,255,.05)}
.scenario-panel{display:none}
.scenario-panel.active{display:block}
.scenario-section select{
  width:100%;padding:.5rem .8rem;border-radius:8px;
  background:var(--card);color:var(--text);border:1.5px solid rgba(255,255,255,.1);
  font-size:.88rem;cursor:pointer;
}
.scenario-section select:focus{outline:none;border-color:var(--accent)}
.scenario-section textarea{
  width:100%;min-height:60px;padding:.55rem .8rem;border-radius:8px;
  background:var(--card);color:var(--text);border:1.5px solid rgba(255,255,255,.1);
  font-family:inherit;font-size:.88rem;resize:vertical;line-height:1.5;
}
.scenario-section textarea:focus{outline:none;border-color:var(--accent)}
.scenario-section textarea::placeholder{color:var(--muted)}
.scenario-preview{
  margin-top:.5rem;padding:.6rem .9rem;border-radius:8px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  font-size:.85rem;color:var(--text);line-height:1.5;text-align:center;
  display:none;
}
.scenario-preview.visible{display:block}
.scenario-banner{
  max-width:540px;width:100%;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);border-radius:10px;
  padding:.5rem .9rem;font-size:.78rem;color:var(--muted);text-align:center;line-height:1.4;display:none;
}
.scenario-banner.visible{display:block}

.start-buttons{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;margin-top:.3rem}

/* ---- dice screen ---- */
.dice-wrap{perspective:600px;width:110px;height:110px;margin-bottom:1.5rem}
.cube{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform 1s ease-out;
}
.cube.rolling{animation:spin .8s ease-in-out}
@keyframes spin{0%{transform:rotateX(0) rotateY(0) rotateZ(0)}100%{transform:rotateX(720deg) rotateY(720deg) rotateZ(360deg)}}
.face{
  position:absolute;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  border-radius:10px;border:2px solid rgba(255,255,255,.1);backface-visibility:hidden;
}
.face:nth-child(1){background:var(--joy);transform:rotateY(0deg) translateZ(55px)}
.face:nth-child(2){background:var(--sadness);transform:rotateY(180deg) translateZ(55px)}
.face:nth-child(3){background:var(--anger);transform:rotateY(90deg) translateZ(55px)}
.face:nth-child(4){background:var(--fear);transform:rotateY(-90deg) translateZ(55px)}
.face:nth-child(5){background:var(--surprise);transform:rotateX(90deg) translateZ(55px)}
.face:nth-child(6){background:var(--disgust);transform:rotateX(-90deg) translateZ(55px)}

#dice h2{font-size:1.4rem;margin-bottom:.5rem;opacity:0;transition:opacity .4s .2s}
#dice h2.show{opacity:1}
#dice .emotion-label{font-size:2rem;font-weight:800;opacity:0;transition:opacity .5s .3s}
#dice .emotion-label.show{opacity:1}
.player-turn{font-size:.85rem;color:var(--muted);margin-bottom:.8rem;opacity:0;transition:opacity .3s}
.player-turn.show{opacity:1}

/* ---- art screen ---- */
#art{gap:.8rem}
.art-card{
  background:var(--card);border-radius:var(--radius);overflow:hidden;
  max-width:540px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.4);
  display:flex;flex-direction:column;
}
.art-img-wrap{
  position:relative;width:100%;min-height:220px;
  display:flex;align-items:center;justify-content:center;background:#111;cursor:zoom-in;
}
.art-img-wrap img{width:100%;display:block;object-fit:contain;max-height:48vh;opacity:0;transition:opacity .6s ease}
.art-img-wrap img.loaded{opacity:1}
.spinner{position:absolute;width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:rgba(255,255,255,.5);border-radius:50%;animation:rotate .8s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}
.art-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:.8rem 1.1rem;gap:.8rem;
}
.art-info{flex:1;min-width:0}
.art-info h3{font-size:.95rem;margin-bottom:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.art-info p{color:var(--muted);font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timer-inline{
  display:flex;align-items:center;gap:.5rem;flex-shrink:0;
}
.timer-ring{
  width:44px;height:44px;position:relative;
}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:3}
.timer-ring .track{stroke:rgba(255,255,255,.08)}
.timer-ring .progress{stroke:var(--accent);transition:stroke .5s}
.timer-ring .progress.warning{stroke:var(--warn)}
.timer-ring .progress.danger{stroke:var(--danger)}
.timer-num{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:.9rem;font-weight:700;font-variant-numeric:tabular-nums;
}
.timer-num.pulse{animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

.emotion-badge{
  display:inline-block;padding:.3rem .9rem;border-radius:6px;
  font-weight:700;font-size:.85rem;
  background:rgba(255,255,255,.06);
  color:var(--accent);border:1.5px solid var(--accent);
}
.prompt-text{color:var(--muted);font-size:.88rem;max-width:420px;text-align:center;line-height:1.5}

.vignette{display:none}

/* ---- lightbox ---- */
.lightbox{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;cursor:zoom-out;
}
.lightbox.open{opacity:1;pointer-events:auto}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain}

/* ---- result screen ---- */
#result{gap:.8rem}
#result h2{font-size:1.6rem;font-weight:800}
#result .sub{color:var(--muted);max-width:400px;text-align:center;line-height:1.5;font-size:.9rem}
.result-recap{
  max-width:400px;width:100%;background:var(--card);border-radius:var(--radius);
  overflow:hidden;display:flex;gap:0;
}
.result-recap img{width:100px;height:80px;object-fit:cover;flex-shrink:0}
.result-recap-info{padding:.6rem .9rem;display:flex;flex-direction:column;justify-content:center;min-width:0}
.result-recap-info .recap-emotion{font-weight:700;font-size:.9rem;margin-bottom:.15rem}
.result-recap-info .recap-title{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.reflection-area{max-width:400px;width:100%}
.reflection-area textarea{
  width:100%;min-height:70px;padding:.7rem .9rem;border-radius:10px;
  background:var(--card);color:var(--text);border:1.5px solid rgba(255,255,255,.1);
  font-family:inherit;font-size:.88rem;resize:vertical;line-height:1.5;
}
.reflection-area textarea:focus{outline:none;border-color:var(--accent)}
.reflection-area textarea::placeholder{color:var(--muted)}

.art-details{
  max-width:400px;width:100%;background:var(--card);border-radius:var(--radius);
  overflow:hidden;transition:max-height .4s ease;
}
.art-details summary{
  padding:.7rem 1rem;cursor:pointer;font-size:.85rem;font-weight:600;
  color:var(--muted);list-style:none;display:flex;align-items:center;gap:.4rem;
}
.art-details summary::before{content:'▸';transition:transform .2s}
.art-details[open] summary::before{transform:rotate(90deg)}
.art-details .details-body{padding:0 1rem .8rem;font-size:.82rem;color:var(--muted);line-height:1.6}

.result-buttons{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center}

/* ---- journal screen ---- */
#journal{padding-top:3.5rem}
#journal h2{font-size:1.5rem;font-weight:800;margin-bottom:1rem}
.journal-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:.8rem;max-width:700px;width:100%;padding-bottom:2rem;
}
.journal-entry{
  background:var(--card);border-radius:var(--radius);overflow:hidden;
}
.journal-entry img{width:100%;height:140px;object-fit:cover}
.journal-entry-info{padding:.7rem .9rem}
.journal-entry-info .je-emotion{font-weight:700;font-size:.85rem;margin-bottom:.15rem}
.journal-entry-info .je-title{font-size:.78rem;color:var(--muted)}
.journal-entry-info .je-player{font-size:.72rem;color:var(--muted);margin-top:.2rem;font-style:italic}
.journal-entry-info .je-reflection{font-size:.78rem;color:var(--text);margin-top:.4rem;line-height:1.4;opacity:.8}
.journal-empty{color:var(--muted);font-size:.9rem}

/* ---- responsive ---- */
@media(max-width:500px){
  .setup-grid{grid-template-columns:1fr}
  .art-img-wrap{min-height:160px}
  .art-card{max-width:98vw}
  .btn{padding:.65rem 1.4rem;font-size:.92rem}
  .result-recap img{width:80px;height:65px}
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start" class="screen active">
  <h1>The Emotion Gallery</h1>
  <p class="subtitle">Roll the dice to land on an emotion, then study a piece of art. Find a connection before time runs out.</p>

  <div class="setup-grid">
    <div class="setup-group">
      <label>Difficulty</label>
      <select id="selDifficulty">
        <option value="relaxed">Relaxed (20s)</option>
        <option value="standard" selected>Standard (15s)</option>
        <option value="challenge">Challenge (10s)</option>
        <option value="chaos">Chaos (15s, 2 emotions)</option>
      </select>
    </div>
    <div class="setup-group">
      <label>Emotions</label>
      <select id="selEmotions">
        <option value="basic">Basic (6)</option>
        <option value="extended">Extended (12)</option>
      </select>
    </div>
  </div>

  <div class="player-setup">
    <label>Players (optional)</label>
    <div class="player-input-row">
      <input type="text" id="playerInput" placeholder="Enter a name..." maxlength="20">
      <button class="btn btn-ghost btn-sm" id="btnAddPlayer">Add</button>
    </div>
    <div class="player-tags" id="playerTags"></div>
  </div>

  <div class="scenario-section">
    <label>Scenario</label>
    <div class="scenario-tabs">
      <button class="scenario-tab active" data-tab="random">Random</button>
      <button class="scenario-tab" data-tab="pick">Choose</button>
      <button class="scenario-tab" data-tab="custom">Write Your Own</button>
    </div>
    <div class="scenario-panel active" id="panelRandom">
      <button class="btn btn-ghost btn-sm" id="btnScenario" style="width:100%">Generate Random Scenario</button>
      <div class="scenario-preview" id="scenarioPreview"></div>
    </div>
    <div class="scenario-panel" id="panelPick">
      <select id="selScenario">
        <option value="">— No scenario —</option>
      </select>
    </div>
    <div class="scenario-panel" id="panelCustom">
      <textarea id="customScenario" placeholder="Write your own scenario... e.g. You are choosing one piece of art for a colony ship to Mars."></textarea>
    </div>
  </div>

  <div class="start-buttons">
    <button class="btn" id="btnStart">Roll the Dice</button>
  </div>
</div>

<!-- DICE ROLL -->
<div id="dice" class="screen">
  <div class="player-turn" id="playerTurn"></div>
  <div class="dice-wrap">
    <div class="cube" id="cube">
      <div class="face">Joy</div>
      <div class="face">Sadness</div>
      <div class="face">Anger</div>
      <div class="face">Fear</div>
      <div class="face">Surprise</div>
      <div class="face">Disgust</div>
    </div>
  </div>
  <h2 id="diceHeading">Your emotion is…</h2>
  <div class="emotion-label" id="emotionLabel"></div>
</div>

<!-- ART + TIMER -->
<div id="art" class="screen">
  <div class="scenario-banner" id="scenarioBanner"></div>
  <div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;justify-content:center">
    <div class="emotion-badge" id="emotionBadge"></div>
    <div class="emotion-badge" id="emotionBadge2" style="display:none"></div>
  </div>
  <p class="prompt-text" id="promptText"></p>
  <div class="art-card">
    <div class="art-img-wrap" id="artImgWrap">
      <div class="spinner" id="spinner"></div>
      <img id="artImg" alt="Artwork">
    </div>
    <div class="art-footer">
      <div class="art-info">
        <h3 id="artTitle"></h3>
        <p id="artArtist"></p>
      </div>
      <div class="timer-inline">
        <div class="timer-ring">
          <svg viewBox="0 0 44 44"><circle class="track" cx="22" cy="22" r="19"/><circle class="progress" id="timerProgress" cx="22" cy="22" r="19"/></svg>
          <div class="timer-num" id="timerText">15</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <h2 id="resultHeading">Time's Up!</h2>
  <p class="sub" id="resultSub"></p>
  <div class="result-recap" id="resultRecap">
    <img id="recapImg" alt="">
    <div class="result-recap-info">
      <div class="recap-emotion" id="recapEmotion"></div>
      <div class="recap-title" id="recapTitle"></div>
    </div>
  </div>
  <div class="reflection-area">
    <textarea id="reflectionInput" placeholder="Type your reflection (optional)..." rows="3"></textarea>
  </div>
  <details class="art-details" id="artDetails">
    <summary>About this artwork</summary>
    <div class="details-body" id="artDetailsBody"></div>
  </details>
  <div class="result-buttons">
    <button class="btn btn-ghost btn-sm" id="btnShare">Download Round</button>
    <button class="btn btn-ghost btn-sm" id="btnJournal">View Journal</button>
    <button class="btn" id="btnAgain">Roll Again</button>
  </div>
</div>

<!-- JOURNAL -->
<div id="journal" class="screen">
  <h2>Session Journal</h2>
  <div class="journal-grid" id="journalGrid"></div>
  <button class="btn" id="btnBackFromJournal" style="margin-top:1rem">Back</button>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox"><img id="lightboxImg" alt="Zoomed artwork"></div>

<!-- VIGNETTE -->
<div class="vignette" id="vignette"></div>

<!-- FIXED BUTTONS -->
<button class="overlay-btn" id="btnSkip">Skip (S)</button>
<button class="overlay-btn" id="btnHome">Home</button>
<div id="roundCounter"></div>
<button id="btnMute">Sound On</button>

<!-- SHARE CANVAS -->
<canvas id="shareCanvas" width="800" height="600" style="display:none"></canvas>

<script>
(function(){

/* ================ CONSTANTS ================ */

const BASIC_EMOTIONS = [
  {name:'Joy',      css:'--joy',      rotation:'rotateY(0deg)'},
  {name:'Sadness',  css:'--sadness',  rotation:'rotateY(180deg)'},
  {name:'Anger',    css:'--anger',    rotation:'rotateY(-90deg)'},
  {name:'Fear',     css:'--fear',     rotation:'rotateY(90deg)'},
  {name:'Surprise', css:'--surprise', rotation:'rotateX(-90deg)'},
  {name:'Disgust',  css:'--disgust',  rotation:'rotateX(90deg)'},
];

const EXTENDED_EMOTIONS = [
  ...BASIC_EMOTIONS,
  {name:'Nostalgia', css:'--nostalgia', rotation:null},
  {name:'Awe',       css:'--awe',       rotation:null},
  {name:'Melancholy', css:'--melancholy', rotation:null},
  {name:'Tension',   css:'--tension',   rotation:null},
  {name:'Serenity',  css:'--serenity',  rotation:null},
  {name:'Longing',   css:'--longing',   rotation:null},
];

const DIFFICULTIES = {
  relaxed:  {time:20, label:'Relaxed'},
  standard: {time:15, label:'Standard'},
  challenge:{time:10, label:'Challenge'},
  chaos:    {time:15, label:'Chaos'},
};

const PROMPTS = {
  Joy:       ['Where in this artwork do you feel warmth or movement?','What colors or shapes here make you want to smile?','If this art could sing, what would it sound like?'],

/* ================ SOUND (Web Audio API) ================ */

function ensureAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function playNoise(duration, volume){
  if(!soundEnabled) return;
  const ctx = ensureAudio();
  const buf = ctx.createBuffer(1, ctx.sampleRate*duration, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*volume;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+duration);
  src.connect(gain).connect(ctx.destination);
  src.start();
}

function playTone(freq, duration, type, vol){
  if(!soundEnabled) return;
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type||'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol||0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+duration);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+duration);
}

function playDiceSound(){playNoise(0.4,0.3)}

const EMOTION_TONES = {
  Joy:440, Sadness:260, Anger:330, Fear:370, Surprise:520, Disgust:294,
  Nostalgia:392, Awe:350, Melancholy:277, Tension:415, Serenity:466, Longing:311,
};
function playEmotionChime(name){
  const f = EMOTION_TONES[name]||400;
  playTone(f,0.6,'sine',0.12);
  setTimeout(()=>playTone(f*1.5,0.4,'sine',0.08),150);
}
function playTick(){playTone(800,0.05,'square',0.06)}
function playBell(){
  playTone(523,1.2,'sine',0.12);
  playTone(659,1.0,'sine',0.08);
  playTone(784,0.8,'sine',0.06);
}

function renderPlayers(){
  const container = $('playerTags');
  container.innerHTML = '';
  players.forEach((name,i) => {
    const tag = document.createElement('span');
    tag.className = 'player-tag';
    tag.innerHTML = name+' <span class="remove" data-i="'+i+'">&times;</span>';
    container.appendChild(tag);
  });
  container.querySelectorAll('.remove').forEach(el => {
    el.addEventListener('click', ()=>{
      players.splice(+el.dataset.i,1);
      renderPlayers();
    });
  });
}

function addPlayer(){
  const input = $('playerInput');
  const name = input.value.trim();
  if(name && players.length < 8){
    players.push(name);
    input.value = '';
    renderPlayers();
  }
  input.focus();
}

/* ================ DICE ROLL ================ */

function clearDiceTimeouts(){
  diceTimeouts.forEach(id=>clearTimeout(id));
  diceTimeouts=[];
}

function rollDice(){
  clearDiceTimeouts();
  clearInterval(timerInterval);
  $('vignette').classList.remove('active');

  const emos = getEmotions();
  currentEmotion = pickRandom(emos);
  currentEmotion2 = difficulty==='chaos' ? pickRandom(emos.filter(e=>e.name!==currentEmotion.name)) : null;
  setAccent(currentEmotion.css);

  roundNumber++;
  $('roundCounter').textContent = 'Round '+roundNumber;

  const turn = $('playerTurn');
  if(players.length){
    turn.textContent = players[currentPlayerIdx % players.length]+"'s turn";
    turn.classList.add('show');
  } else {
    turn.textContent='';
    turn.classList.remove('show');
  }

  const cube = $('cube');
  const heading = $('diceHeading');
  const label = $('emotionLabel');

  heading.classList.remove('show');
  label.classList.remove('show');
  label.textContent = '';

  cube.style.transition = 'none';
  cube.style.transform = 'rotateX(0) rotateY(0)';
  void cube.offsetHeight;

  showScreen('dice');
  playDiceSound();

  cube.classList.add('rolling');
  cube.style.transition = '';

  const useSlotReveal = currentEmotion.rotation === null;

  diceTimeouts.push(setTimeout(()=>{
    cube.classList.remove('rolling');
    if(!useSlotReveal){
      const extra='rotateX('+360*3+'deg) rotateY('+360*3+'deg) ';
      cube.style.transform = extra + currentEmotion.rotation;
    }
  },800));

  diceTimeouts.push(setTimeout(()=>heading.classList.add('show'),1200));

  diceTimeouts.push(setTimeout(()=>{
    let text = currentEmotion.name;
    if(currentEmotion2) text += ' + ' + currentEmotion2.name;
    label.textContent = text;
    label.style.color = `var(${currentEmotion.css})`;
    label.classList.add('show');
    playEmotionChime(currentEmotion.name);
  },1500));

  diceTimeouts.push(setTimeout(fetchArt,2200));
}

  else banner.classList.remove('visible');

    badge2.style.color = `var(${currentEmotion2.css})`;
    badge2.style.borderColor = `var(${currentEmotion2.css})`;
  } else badge2.style.display='none';

  const promptKey = currentEmotion.name;
  const prompts = PROMPTS[promptKey]||PROMPTS.Joy;
  currentPrompt = difficulty==='challenge' ? '' : pickRandom(prompts);
  $('promptText').textContent = currentPrompt;

  const img = $('artImg');

  img.src='';
  $('spinner').style.display='block';

  $('artArtist').textContent='';

  resetTimer();
  return img;
}

function setCurrentArt(src, title, artist, desc){
  currentArtSrc=src; currentArtTitle=title; currentArtArtist=artist; currentArtDesc=desc||'';
}

function showArtwork(img, imgUrl, title, artist, desc){
  $('artTitle').textContent=title;
  $('artArtist').textContent=artist;
  setCurrentArt(imgUrl, title, artist, desc);
  img.onload=()=>{img.classList.add('loaded');$('spinner').style.display='none';startTimer()};
  img.onerror=()=>useLocalFallback(img);
  img.src=imgUrl;
}

function useLocalFallback(img){
  const pick=pickRandom(LOCAL_ART);
  $('artTitle').textContent=pick.title;
  $('artArtist').textContent=pick.artist;
  setCurrentArt('art/'+pick.file, pick.title, pick.artist, '');
  img.onload=()=>{img.classList.add('loaded');$('spinner').style.display='none';startTimer()};
  img.onerror=()=>{$('spinner').style.display='none';img.classList.add('loaded');$('artTitle').textContent='Could not load image';startTimer()};
  img.src='art/'+pick.file;
}

async function fetchArt(){
  const img=prepareArtScreen();
  const page=Math.floor(Math.random()*200)+1;
  const queries=['abstract painting','abstract expressionism','modern abstract','abstract composition','non-objective art'];
  const q=pickRandom(queries);
  const url=`${API_BASE}?q=${encodeURIComponent(q)}&fields=id,title,artist_display,image_id,description,date_display,medium_display&limit=10&page=${page}&query[term][is_public_domain]=true`;

  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),6000);
    const res=await fetch(url,{signal:controller.signal});
    clearTimeout(timeout);
    const json=await res.json();
    const pool=(json.data||[]).filter(a=>a.image_id);
    if(!pool.length) throw new Error('empty');
    const pick=pickRandom(pool);
    const imgUrl=`https://www.artic.edu/iiif/2/${pick.image_id}/full/843,/0/default.jpg`;
    let desc = '';
    if(pick.date_display) desc += pick.date_display;
    if(pick.medium_display) desc += (desc?' — ':'')+pick.medium_display;
    if(pick.description){
      const tmp=document.createElement('div');tmp.innerHTML=pick.description;
      desc += (desc?'\n\n':'')+tmp.textContent.slice(0,300);
    }
    showArtwork(img, imgUrl, pick.title||'Untitled', pick.artist_display||'Unknown artist', desc);
  }catch(err){
    useLocalFallback(img);
  }
}

/* ================ TIMER ================ */

const CIRCUMFERENCE = 2*Math.PI*19;

function resetTimer(){
  clearInterval(timerInterval);
  const prog=$('timerProgress');
  prog.style.strokeDasharray=CIRCUMFERENCE;
  prog.style.strokeDashoffset='0';
  prog.style.transition='none';
  prog.classList.remove('warning','danger');
  $('timerText').textContent=getTimerDuration();
  $('timerText').classList.remove('pulse');
  $('vignette').classList.remove('active');
}

function startTimer(){
  clearInterval(timerInterval);
  let remaining=getTimerDuration();
  const total=remaining;
  const prog=$('timerProgress');

  prog.style.strokeDasharray=CIRCUMFERENCE;
  void prog.offsetHeight;
  prog.style.transition=`stroke-dashoffset ${total}s linear, stroke .5s`;
  prog.style.strokeDashoffset=CIRCUMFERENCE;

  $('timerText').textContent=remaining;

  timerInterval=setInterval(()=>{
    remaining--;
    $('timerText').textContent=Math.max(remaining,0);

    if(remaining<=5 && remaining>3){
      prog.classList.add('warning');
      prog.classList.remove('danger');
      playTick();
    }
    if(remaining<=3 && remaining>0){
      prog.classList.remove('warning');
      prog.classList.add('danger');
      $('timerText').classList.add('pulse');
      playTick();
    }
    if(remaining<=3) $('vignette').classList.add('active');

    if(remaining<=0){
      clearInterval(timerInterval);
      playBell();
      showResult();
    }
  },1000);
}

/* ================ SHARE ================ */

function shareRound(){
  saveRound();
  const canvas=$('shareCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=800;canvas.height=520;

  ctx.fillStyle='#0f0f1a';
  ctx.fillRect(0,0,800,520);

  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    const maxW=360,maxH=420;
    let w=img.width,h=img.height;
    const scale=Math.min(maxW/w,maxH/h);
    w*=scale;h*=scale;
    const x=40,y=(520-h)/2;
    ctx.drawImage(img,x,y,w,h);

    const tx=440;
    ctx.fillStyle='#f6c944';
    ctx.font='bold 14px system-ui';
    ctx.fillText('THE EMOTION GALLERY',tx,60);

    let emotionLabel=currentEmotion.name;
    if(currentEmotion2) emotionLabel+=' + '+currentEmotion2.name;
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue(currentEmotion.css).trim();
    ctx.font='bold 28px system-ui';
    ctx.fillText(emotionLabel,tx,100);

    ctx.fillStyle='#e0e0e0';
    ctx.font='16px system-ui';
    wrapText(ctx,currentArtTitle,tx,140,320,22);

    ctx.fillStyle='#888';
    ctx.font='14px system-ui';
    ctx.fillText(currentArtArtist,tx,180);

    const reflection=$('reflectionInput').value.trim();
    if(reflection){
      ctx.fillStyle='#aaa';
      ctx.font='italic 13px system-ui';
      wrapText(ctx,'"'+reflection+'"',tx,220,320,18);
    }

    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='emotion-gallery-round-'+roundNumber+'.png';
      a.click();
      URL.revokeObjectURL(url);
    });
  };
  img.onerror=()=>{
    ctx.fillStyle='#888';ctx.font='16px system-ui';
    ctx.fillText('Could not load image for share',100,260);
  };
  img.src=currentArtSrc;
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' ');
  let line='';
  for(const w of words){
    const test=line+w+' ';
    if(ctx.measureText(test).width>maxW && line){
      ctx.fillText(line.trim(),x,y);
      line=w+' ';y+=lineH;
    } else line=test;
  }
  ctx.fillText(line.trim(),x,y);
}

/* ================ SCENARIO ================ */

(function initScenarioTabs(){
  const tabs=document.querySelectorAll('.scenario-tab');
  const panels={random:$('panelRandom'),pick:$('panelPick'),custom:$('panelCustom')};
  tabs.forEach(t=>t.addEventListener('click',()=>{
    tabs.forEach(x=>x.classList.remove('active'));
    Object.values(panels).forEach(p=>p.classList.remove('active'));
    t.classList.add('active');
    panels[t.dataset.tab].classList.add('active');
  }));
  const sel=$('selScenario');
  SCENARIOS.forEach((s,i)=>{
    const opt=document.createElement('option');
    opt.value=i;
    opt.textContent=s.length>80?s.slice(0,77)+'…':s;
    sel.appendChild(opt);
  });
})();

function generateScenario(){
  currentScenario=pickRandom(SCENARIOS);
  const prev=$('scenarioPreview');
  prev.textContent=currentScenario;
  prev.classList.add('visible');
}

function resolveScenario(){
  const activeTab=document.querySelector('.scenario-tab.active');
  if(!activeTab) return;
  const tab=activeTab.dataset.tab;
  if(tab==='random'){
    const prev=$('scenarioPreview');
    if(prev.classList.contains('visible')&&prev.textContent.trim()){
      currentScenario=prev.textContent.trim();
    } else {
      currentScenario=null;
    }
  } else if(tab==='pick'){
    const val=$('selScenario').value;
    currentScenario=val!==''?SCENARIOS[parseInt(val)]:null;
  } else if(tab==='custom'){
    const txt=$('customScenario').value.trim();
    currentScenario=txt||null;
  }
}

/* ================ KEYBOARD SHORTCUTS ================ */

document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  const key=e.key.toLowerCase();
  if((key===' '||key==='enter')&&(activeScreen==='start'||activeScreen==='result')){
    e.preventDefault();
    if(activeScreen==='start'){resolveScenario();rollDice();}
    else nextRound();
  }
  if(key==='s'&&activeScreen==='art') skipRound();
  if(key==='g'&&activeScreen==='start') generateScenario();
  if(key==='escape'){
    if($('lightbox').classList.contains('open')) closeLightbox();
  }
});

$('btnShare').addEventListener('click', shareRound);
$('artImgWrap').addEventListener('click', openLightbox);
$('lightbox').addEventListener('click', closeLightbox);

$('btnAddPlayer').addEventListener('click', addPlayer);
$('playerInput').addEventListener('keydown',e=>{if(e.key==='Enter')addPlayer()});

$('btnMute').addEventListener('click',()=>{
  soundEnabled=!soundEnabled;
  $('btnMute').textContent=soundEnabled?'Sound On':'Sound Off';
});

$('selDifficulty').addEventListener('change',e=>{
  if(e.target.value==='chaos'||e.target.value==='challenge'){
    $('selEmotions').value='extended';
  }
});

})();
</script>
</body>
</html>
